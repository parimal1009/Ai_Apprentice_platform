services:
  # --------------------------------
  # 1) FastAPI Backend
  # --------------------------------
  - type: web
    name: apprentice-api
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: DATABASE_URL
        # Automatically connect to the postgres database below
        fromDatabase:
          name: apprentice-db
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: apprentice-db
          property: connectionString
      - key: SECRET_KEY
        # Automatically generate a secure secret key for JWTs!
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
        
  # --------------------------------
  # 2) React Frontend
  # --------------------------------
  - type: web
    name: apprentice-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: NODE_VERSION
        value: 20
    routes:
      # React Router SPA handling
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # --------------------------------
  # 3) Free PostgreSQL Database
  # --------------------------------
  - name: apprentice-db
    databaseName: apprentice
    user: apprentice_user
    plan: free
